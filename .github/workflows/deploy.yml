name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build Backend JAR
      working-directory: hotelBackend
      run: |
        mvn clean package -DskipTests

    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Build & Push Backend Docker Image
      run: |
        docker build -t nemal2/hotel-backend:latest hotelBackend/
        docker push nemal2/hotel-backend:latest

    - name: Build & Push Frontend Docker Image
      run: |
        docker build -t nemal2/hotel-frontend:latest hotel-booking/
        docker push nemal2/hotel-frontend:latest

    - name: Deploy on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AWS_EC2_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          docker pull nemal2/hotel-backend:latest
          docker pull nemal2/hotel-frontend:latest
          docker-compose up -d
